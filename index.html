<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Run GitHub Workflow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main class="container py-5">
    <div class="col-lg-6">
      <h1>Run GitHub Workflow</h1>

      <form id="dispatch-form">
        <label for="token" class="form-label">Please enter the secret token provided in your AE instructions:</label>
        <input id="token" name="token" type="password" class="form-control" placeholder="github_pat_XXXX..." autocomplete="off">
        <button type="submit" class="btn btn-primary mt-3">Run workflow</button>
      </form>

      <p id="status" class="mt-3 text-break" role="status"></p>
    </div>
  </main>

  <script type="module">
    import { Octokit } from "https://cdn.jsdelivr.net/npm/@octokit/core/+esm";

    const form = document.getElementById("dispatch-form");
    const tokenInput = document.getElementById("token");
    const submitButton = form.querySelector("button");
    const status = document.getElementById("status");

    tokenInput.addEventListener("input", () => {
      submitButton.disabled = false;
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitButton.disabled = true;

      const token = tokenInput.value;
      if (!token) {
        status.textContent = "Please enter a token.";
        return;
      }

      status.textContent = "Sending workflow dispatch request...";

      try {
        const octokit = new Octokit({ auth: token });
        const response = await octokit.request(
          "POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches",
          {
            owner: "lashhw",
            repo: "test-workflow-dispatch",
            workflow_id: "ci.yml",
            ref: "main",
            headers: {
              "X-GitHub-Api-Version": "2026-03-10"
            }
          }
        );

        if (response.status === 200 && response.data?.html_url) {
          status.textContent = "The workflow was started successfully. View the run:";

          const link = document.createElement("a");
          link.href = response.data.html_url;
          link.textContent = response.data.html_url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          status.append(" ", link);

          return;
        }

        status.textContent = `Request failed (${response.status}).`;
      } catch (error) {
        const details = error.response?.data?.message || error.message;
        status.textContent = `Request failed: ${details}`;
      }
    });
  </script>
</body>
</html>
