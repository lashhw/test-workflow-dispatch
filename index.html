<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Run GitHub Workflow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main class="container py-5">
    <div class="col-lg-6">
      <h1>Run GitHub Workflow</h1>

      <form id="dispatch-form">
        <label for="token" class="form-label">Please enter the secret token provided in your AE instructions:</label>
        <input id="token" name="token" type="password" class="form-control" placeholder="github_pat_XXXX..." autocomplete="off">
        <button type="submit" class="btn btn-primary mt-3">Run workflow</button>
      </form>

      <p id="status" class="mt-3 text-break" role="status"></p>
    </div>
  </main>

  <script>
    const form = document.getElementById("dispatch-form");
    const tokenInput = document.getElementById("token");
    const submitButton = form.querySelector("button");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const token = tokenInput.value.trim();
      if (!token) {
        status.textContent = "Please enter a token.";
        return;
      }

      let requestSucceeded = false;
      submitButton.disabled = true;
      status.textContent = "Sending workflow dispatch request...";

      try {
        const response = await fetch(
          "https://api.github.com/repos/lashhw/test-workflow-dispatch/actions/workflows/ci.yml/dispatches",
          {
            method: "POST",
            headers: {
              "Accept": "application/vnd.github+json",
              "Authorization": `Bearer ${token}`,
              "X-GitHub-Api-Version": "2026-03-10",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ ref: "main" })
          }
        );

        if (response.status === 200) {
          const result = await response.json();
          requestSucceeded = true;
          status.textContent = "The workflow was started successfully. View the run:";

          const link = document.createElement("a");
          link.href = result.html_url;
          link.textContent = result.html_url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          status.append(" ", link);

          return;
        }

        const message = await response.text();
        status.textContent = `Request failed (${response.status}): ${message || response.statusText}`;
      } catch (error) {
        status.textContent = `Request failed: ${error.message}`;
      } finally {
        if (!requestSucceeded) {
          submitButton.disabled = false;
        }
      }
    });
  </script>
</body>
</html>
