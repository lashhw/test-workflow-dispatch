name: CI
run-name: ${{ inputs.task }}
on:
  workflow_dispatch:
    inputs:
      task:
        type: choice
        required: true
        options:
        - task_1
        - task_2
jobs:
  run:
    name: ${{ inputs.task }}
    runs-on: ubuntu-latest
    steps:
      - name: Run task_1
        if: ${{ inputs.task == 'task_1' }}
        run: sleep 1s
      - name: Run task_2
        if: ${{ inputs.task == 'task_2' }}
        run: sleep 1m
